name: Daily Market Analysis

on:
  schedule:
    # 21:00 UTC = 06:00 JST (Mon-Fri)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start Date (YYYY-MM-DD HH:MM)'
        required: false
      end_date:
        description: 'End Date (YYYY-MM-DD HH:MM)'
        required: false

jobs:
  analyze_and_notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run analysis with baseline
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        if [ -n "${{ inputs.start_date }}" ] && [ -n "${{ inputs.end_date }}" ]; then
          python run_with_baseline.py --start "${{ inputs.start_date }}" --end "${{ inputs.end_date }}"
        else
          python run_with_baseline.py --days 14
        fi

    - name: Send to Discord
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python notify_discord.py
